function lYearDays(y) {
  var i, sum = 348;
  for(i=0x8000; i>0x8; i>>=1) {
    if((lunarInfo[y-1900] & i)!=0) sum += 1;
  }
  return(sum+leapDays(y));
}

function leapDays(y) {
  if(leapMonth(y)!=0) {
    if((lunarInfo[y-1900] & 0x10000)!=0) return 30;
    else return 29;
  }
  else return 0;
}

function leapMonth(y) {
  return(lunarInfo[y-1900] & 0xf);
}

function lunarDay(y, m, d) {
  var day = 0;
  var i;
  if(leapMonth(y)<=m && leapMonth(y)>0) m++;
  for(i=1; i<m; i++) day += lunarMonthDays(y, i);
  return(day + d);
}

function lunarMonthDays(y, m) {
  var mask = 0x10000 >> m;
  var result = (lunarInfo[y-1900] & mask) === 0 ? 29 : 30;
  return result;
}

function monthDays(y, m) {
  return( (lunarInfo[y-1900] & (0x10000>>m))? 30: 29 );
}

function solarDays(y, m) {
  var ms = m-1;
  if(ms==1) {
    if((y%4==0 && y%100!=0) || y%400==0) return 29;
    else return 28;
  }
  else return solarMonth[ms];
}

function cyclical(m) {
  return(Gan[m%10]+Zhi[m%12]);
}

function sTerm(y, n) {
  var offDate = new Date( ( 31556925974.7 * ( y - 1900 ) + sTermInfo[n] * 60000 ) + Date.UTC(1900, 0, 6, 2, 5) );

}

function Lunar(objDate) {
  var i, leap=0, temp=0;
  var baseDate = new Date(1900,0,31);
  var offset = (objDate - baseDate)/86400000;

  this.dayCyl = offset + 40;
  this.monCyl = 14;

  for(i=1900; i<2050 && offset>0; i++) {
    temp = lYearDays(i);
    offset -= temp;
    this.monCyl += 12;
  }

  if(offset<0) {
    offset += temp;
    i--;
    this.monCyl -= 12;
  }

  this.year = i;
  this.yearCyl = i-1864;

  leap = leapMonth(i); //闰哪个月
  this.isLeap = false;

  for(i=1; i<13 && offset>0; i++) {
    //闰月
    if(leap>0 && i==(leap+1) && this.isLeap==false)
    { --i; this.isLeap = true; temp = leapDays(this.year); }
    else
    { temp = monthDays(this.year, i); }

    //解除闰月
    if(this.isLeap==true && i==(leap+1)) this.isLeap = false;

    offset -= temp;
    if(this.isLeap == false) this.monCyl++;
  }

  if(offset==0 && leap>0 && i==leap+1)
    if(this.isLeap)
    { this.isLeap = false; }
    else
    { this.isLeap = true; --i; --this.monCyl;}

  if(offset<0){ offset += temp; --i; --this.monCyl; }

  this.month = i;
  this.day = offset + 1;
}

function cDay(d) {
  // 确保d是有效数字并进行范围检查
  d = parseInt(d);
  if (isNaN(d) || d <= 0 || d > 30) {
    return '';
  }
  
  // 创建一个本地的数字数组，避免依赖全局的nStr1数组索引问题
  var nums = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
  var result = '';
  
  // 直接使用switch-case处理农历日期转换
  switch(d) {
    case 10:
      result = '初十';
      break;
    case 20:
      result = '二十';
      break;
    case 30:
      result = '三十';
      break;
    case 1:
    case 2:
    case 3:
    case 4:
    case 5:
    case 6:
    case 7:
    case 8:
    case 9:
      // 1-9日：初+数字
      result = '初' + nums[d-1];
      break;
    case 11:
    case 12:
    case 13:
    case 14:
    case 15:
    case 16:
    case 17:
    case 18:
    case 19:
      // 11-19日：十+数字
      result = '十' + nums[d-11];
      break;
    case 21:
    case 22:
    case 23:
    case 24:
    case 25:
    case 26:
    case 27:
    case 28:
    case 29:
      // 21-29日：廿+数字
      result = '廿' + nums[d-21];
      break;
    default:
      result = '';
  }
  
  return result;
}

  var firstDay = d.getDay();
  // 将周日(0)转换为7，周一(1)转换为0，以此类推
  firstDay = firstDay === 0 ? 6 : firstDay - 1;
  
  mDay = new Date(sYear, sMonth+1, 0).getDate();
  
  for(i=0; i<42; i++) {
    cld[i] = new calElement();
  }
  
  for(i=0; i<6; i++) {
    for(j=0; j<7; j++) {
      k = i*7+j;
      l = k - firstDay + 1;
      
      // 只对有效日期计算农历
      if(l > 0 && l <= mDay) {
        cld[k] = calendar(sYear, sMonth, l);
      } else {
        cld[k] = new calElement();
      }
      
      gDObj = document.getElementById('GD' + k);
      sDObj = document.getElementById('SD' + k);
      lDObj = document.getElementById('LD' + k);
      
      if(l>mDay || l<1) {
        sDObj.innerHTML = '';
        lDObj.innerHTML = '';
        gDObj.style.backgroundColor = '';
      }
      else {
        sDObj.innerHTML = l;
        
        // 修改：优先显示农历节日，然后是节气，最后是公历节日
        var displayText = '';
        
        // 优先显示农历节日
        if(cld[k].lunarFestival) {
          displayText = cld[k].lunarFestival;
        } else if(cld[k].solarTerms) {
          displayText = cld[k].solarTerms;
        } else if(cld[k].solarFestival) {
          displayText = cld[k].solarFestival;
        } else {
          // 显示农历日期
          if(cld[k].lDay !== undefined && cld[k].lDay !== null) {
            displayText = cDay(cld[k].lDay);
            if(cld[k].isLeap && cld[k].lDay == 1) {
              displayText += '(闰)';
            }
          }
        }
        
        lDObj.innerHTML = displayText;
        
        if(sYear==tY && sMonth==tM && l==tD) {
          gDObj.style.backgroundColor = 'aqua';
        }
        else {
          gDObj.style.backgroundColor = '';
        }
        
        // 修改：周末颜色调整（周六为绿色，周日为红色）
        if(j == 5) { // 周六（第六列）
          sDObj.style.color = 'green';
        }
        else if(j == 6) { // 周日（第七列）
          sDObj.style.color = 'red';
        }
        else {
          sDObj.style.color = '';
        }
      }
    }
  }
  
  // 核心部分：设置背景日期显示，使用原始的大字号灰色字体样式
  if(document.getElementById('YMBG')) {
    document.getElementById('YMBG').innerHTML = '&nbsp;' + sYear + '<BR>&nbsp;' + monthName[sMonth];
  }
  
  // 安全设置天干地支信息，添加错误检查（使用原始极品万年历的显示方式）
  if(document.getElementById('GZ')) {
    var cYear = cld[firstDay].cYear || '';
    var cMonth = cld[firstDay].cMonth || '';
    var cDayValue = cld[firstDay].cDay || '';
    // 计算并添加属相信息
    var year = cld[firstDay].sYear || sYear;
    var zodiac = Animals[(year - 4) % 12] || '';
    // 使用原始极品万年历的显示格式
    document.getElementById('GZ').innerHTML = cYear + '年 ' + cMonth + '月 ' + cDayValue + '日  【' + zodiac + '】';
  }
}

function changeCld() {
  try {
    var y, m;
    var cldForm = document.forms['CLD'] || document.CLD;
    
    if (!cldForm || !cldForm.SY || !cldForm.SM) return;
    
    y = parseInt(cldForm.SY.options[cldForm.SY.selectedIndex].text);
    m = parseInt(cldForm.SM.options[cldForm.SM.selectedIndex].text) - 1;
    
    drawCld(y, m);
  } catch(e) {
    console.error('切换日历错误:', e);
  }
}

function pushBtm(K) {
  try {
    var cldForm = document.forms['CLD'] || document.CLD;
    
    if (!cldForm || !cldForm.SY || !cldForm.SM) return;
    
    switch(K) {
    case 'YU': // 年↑
      if(cldForm.SY.selectedIndex > 0) {
        cldForm.SY.selectedIndex--;
      }
      break;
    case 'YD': // 年↓
      if(cldForm.SY.selectedIndex < cldForm.SY.options.length - 1) {
        cldForm.SY.selectedIndex++;
      }
      break;
    case 'MU': // 月↑
      if(cldForm.SM.selectedIndex > 0) {
        cldForm.SM.selectedIndex--;
      }
      else {
        cldForm.SM.selectedIndex = 11;
        if(cldForm.SY.selectedIndex > 0) {
          cldForm.SY.selectedIndex--;
        }
      }
      break;
    case 'MD': // 月↓
      if(cldForm.SM.selectedIndex < 11) {
        cldForm.SM.selectedIndex++;
      }
      else {
        cldForm.SM.selectedIndex = 0;
        if(cldForm.SY.selectedIndex < cldForm.SY.options.length - 1) {
          cldForm.SY.selectedIndex++;
        }
      }
      break;
    case 'TD': // 今天
      cldForm.SY.selectedIndex = tY - 1900;
      cldForm.SM.selectedIndex = tM;
      break;
    default: // 今天
      cldForm.SY.selectedIndex = tY - 1900;
      cldForm.SM.selectedIndex = tM;
    }
    
    changeCld();
  } catch(e) {
    console.error('按钮操作错误:', e);
  }
}

var Today = new Date();
var tY = Today.getFullYear();
var tM = Today.getMonth();
var tD = Today.getDate();

var width = 130;
var offsetx = 2;
var offsety = 16;

var x = 0;
var y = 0;
var snow = 0;
var sw = 0;
var cnt = 0;

var dStyle;
var detailElem;

// 初始化函数
document.addEventListener('DOMContentLoaded', function() {
  detailElem = document.getElementById('detail');
  if (detailElem) {
    dStyle = detailElem.style;
  }
  
  document.onmousemove = mEvn;
});

// 更新当前日期显示
function updateCurrentDate() {
  var today = new Date();
  var day;
  if(today.getDay()==0) day = "星期日"
  if(today.getDay()==1) day = "星期一"
  if(today.getDay()==2) day = "星期二"
  if(today.getDay()==3) day = "星期三"
  if(today.getDay()==4) day = "星期四"
  if(today.getDay()==5) day = "星期五"
  if(today.getDay()==6) day = "星期六"
  
  var date = " 公元 " + (today.getFullYear()) + " 年 " +
    (today.getMonth() + 1 ) + "月 " + today.getDate() + "日 " +
    day +"";
  
  document.getElementById('currentDate').innerHTML = date;
}

// 鼠标悬停到日期单元格上
function mOvr(v) {
  try {
    if (!detailElem) {
      detailElem = document.getElementById('detail');
      if (!detailElem) return;
      dStyle = detailElem.style;
    }
    
    var sObj = document.getElementById('SD' + v);
    var d = v; // 直接使用v作为索引，不需要减1
    
    if(sObj && sObj.innerHTML && sObj.innerHTML.trim() != '') {
      sObj.style.cursor = 's-resize';
      
      if (!cld || typeof cld[d] === 'undefined') return;
      
      var festival = '';
      if(cld[d].solarTerms || cld[d].solarFestival || cld[d].lunarFestival) {
        var festivalText = (cld[d].solarTerms || '') + ' ' + 
                          (cld[d].solarFestival || '') + ' ' + 
                          (cld[d].lunarFestival || '');
        festival = '<TABLE WIDTH=100% BORDER=0 CELLPADDING=2 CELLSPACING=0 BGCOLOR="#CCFFCC"><TR><TD>' +
        '<FONT COLOR="#000000" STYLE="font-size:9pt;">' + festivalText + '</FONT></TD></TR></TABLE>';
      }
      
      var weekNames = ['日', '一', '二', '三', '四', '五', '六'];
      var weekText = weekNames[cld[d].week] || '';
      
      // 提取所有需要的数据并添加安全检查
      var sYear = cld[d].sYear || '';
      var sMonth = cld[d].sMonth || '';
      var sDay = cld[d].sDay || '';
      var isLeap = cld[d].isLeap ? '闰' : '';
      var lMonth = cld[d].lMonth || '';
      var lDay = cld[d].lDay || '';
      var cYear = cld[d].cYear || '';
      var cMonth = cld[d].cMonth || '';
      var cDayValue = cld[d].cDay || '';
      
      // 将农历月份和日期转换为中文数字
      var lMonthChinese = lMonth ? lunarMonthToChinese(parseInt(lMonth)) : '';
      var lDayChinese = lDay ? cDay(parseInt(lDay)) : '';
      
      // 构建显示内容
      var s = '<TABLE WIDTH="130" BORDER=0 CELLPADDING="2" CELLSPACING=0 BGCOLOR="#000066"><TR><TD>' +
        '<TABLE WIDTH=100% BORDER=0 CELLPADDING=0 CELLSPACING=0><TR><TD ALIGN="right"><FONT COLOR="#ffffff" STYLE="font-size:9pt;">' +
        sYear + ' 年 ' + sMonth + ' 月 ' + sDay + ' 日<br>星期' + weekText + '<br>' +
        '<font color="violet">农历' + isLeap + lMonthChinese + '月' + lDayChinese + '</font><br>' +
        '<font color="yellow">' + cYear + '年 ' + cMonth + '月 ' + cDayValue + '日</font>' +
        '</FONT></TD></TR></TABLE>' + festival + '</TD></TR></TABLE>';
      
      // 设置detail内容
      detailElem.innerHTML = s;
      
      // 显示悬停框
      if (snow == 0) {
        dStyle.position = 'absolute';
        dStyle.left = (x + offsetx - (width / 2)) + 'px';
        dStyle.top = (y + offsety) + 'px';
        dStyle.visibility = 'visible';
        dStyle.zIndex = '1000';
        snow = 1;
      }
    }
  } catch(e) {
    // 静默处理错误
  }
}

// 鼠标移出日期单元格
function mOut() {
  try {
    if (cnt >= 1) {
      sw = 0;
    }
    if (sw == 0) {
      snow = 0;
      if (dStyle) {
        dStyle.visibility = 'hidden';
      }
    }
    else cnt++;
  } catch(e) {
    // 静默处理错误
  }
}

// 鼠标移动事件处理
function mEvn(e) {
  try {
    e = e || window.event;
    
    var clientX = e.clientX || 0;
    var clientY = e.clientY || 0;
    
    var scrollLeft = document.body.scrollLeft || document.documentElement.scrollLeft || 0;
    var scrollTop = document.body.scrollTop || document.documentElement.scrollTop || 0;
    
    // 考虑页面缩放比例（1.5）
    var scale = 1.5;
    x = (clientX + scrollLeft) / scale;
    y = (clientY + scrollTop) / scale;
    
    if (snow && dStyle) {
      dStyle.left = (x + offsetx - (width / 2)) + 'px';
      dStyle.top = (y + offsety) + 'px';
    }
  } catch(e) {
    // 静默处理错误
  }
}

// 辅助函数：补零
function padZero(num) {
  return num < 10 ? "0" + num : num;
}

// 辅助函数：将农历月份从阿拉伯数字转换为中文数字
function lunarMonthToChinese(month) {
  var monthNums = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
  if (month >= 1 && month <= 12) {
    return monthNums[month - 1];
  }
  return month.toString();
}

function tick() {
  var today = new Date();
  
  // 更新当前日期
  updateCurrentDate();
  
  // 更新时钟显示
  var dateStr = today.getFullYear() + "/" + 
                padZero(today.getMonth() + 1) + "/" + 
                padZero(today.getDate()) + " " + 
                padZero(today.getHours()) + ":" + 
                padZero(today.getMinutes()) + ":" + 
                padZero(today.getSeconds());
  
  document.getElementById('Clock').innerHTML = dateStr;
  
  setTimeout(tick, 1000);
}

function initial() {
  dStyle = document.getElementById('detail').style;
  var cldForm = document.forms['CLD'] || document.CLD;
  if (!cldForm) return;
  
  cldForm.SY.selectedIndex = tY - 1900;
  cldForm.SM.selectedIndex = tM;
  drawCld(tY, tM);
  
  // 初始化当前日期显示
  updateCurrentDate();
  
  tick();
}
